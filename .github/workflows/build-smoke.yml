name: build-smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build and install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Smoke test CLI entrypoint
        run: |
          cpapacket --version
          cpapacket --help
