name: schema-version-test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  schema-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run schema version tests
        if: ${{ hashFiles('tests/test_schema_versions.py') != '' }}
        run: pytest tests/test_schema_versions.py
