name: privacy-check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  privacy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run privacy check
        run: cpapacket privacy check
